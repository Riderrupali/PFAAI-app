workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Set Android SDK Path
        script: |
          # ही स्टेप Android SDK चा पाथ सेट करते, ज्यामुळे path null चा एरर येणार नाही
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      - name: Build APK
        script: |
          cd android
          # ग्रॅडलला प्रोजेक्ट पाथ स्पष्टपणे सांगणे
          ./gradlew assembleRelease -Pexpo.project.app.path=app
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
