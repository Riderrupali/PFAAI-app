workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Configure Gradle Properties
        script: |
          # ग्रॅडलला प्रोजेक्टचे पाथ आणि नेमस्पेस फाईलद्वारे सक्तीने देणे
          echo "android.namespace=com.riderrupali.pfaai" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
      - name: Build APK
        script: |
          cd android
          # ग्रॅडल बिल्ड करताना Namespace आणि App पाथ पुन्हा स्पष्ट करणे
          ./gradlew assembleRelease -Pandroid.namespace=com.riderrupali.pfaai -Pexpo.project.app.path=app
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
