workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Force Fix Settings Gradle
        script: |
          # हा एरर फिक्स करण्यासाठी आपण ही फाईल पुन्हा तयार करत आहोत
          echo "apply from: '../node_modules/react-native/gradle/react.gradle'" > android/settings.gradle
          echo "apply from: file('../node_modules/@react-native-community/cli-platform-android/native_modules.gradle'); applyNativeModulesSettingsGradle(settings)" >> android/settings.gradle
          echo "include ':app'" >> android/settings.gradle
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
