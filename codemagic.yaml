workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
          npx expo install expo-build-properties
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Fix Build Gradle
        script: |
          # ही कमांड सुनिश्चित करते की app मॉड्यूल नीट ओळखले जाईल
          echo "include ':app'" > android/settings.gradle
      - name: Build APK
        script: |
          cd android
          ./gradlew :app:assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
