workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android
          # आपण इथून ग्रॅडलला 'project.ext' वापरून माहिती देत आहोत
          ./gradlew assembleRelease -Pexpo.project.app.path=app
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
