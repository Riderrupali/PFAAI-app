workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          # --no-bundler काढून टाकले आहे आणि हे अधिक सुरक्षित आहे
          npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android
          # ग्रॅडलला 'app' मॉड्यूलवर लक्ष केंद्रित करायला सांगूया
          ./gradlew :app:assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
