workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          # सर्व जुन्या फाइल्स साफ करणे
          rm -rf android
          # पुन्हा नवीन बिल्ड तयार करणे
          npx expo prebuild --platform android --clean
      - name: Fix Build Gradle
        script: |
          # हा कोड आपोआप build.gradle फाईल मध्ये योग्य व्हॅल्यू टाकण्यासाठी आहे
          echo "android.namespace=com.riderrupali.pfaai" > android/gradle.properties
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
