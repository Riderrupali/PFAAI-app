workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Fix Build Gradle
        script: |
          # आपण पूर्णपणे नवीन आणि सुरक्षित build.gradle फाईल बनवतोय
          echo "apply plugin: 'com.android.application'
          
          android {
              namespace 'com.riderrupali.pfaai'
              compileSdkVersion 34
              defaultConfig {
                  applicationId 'com.riderrupali.pfaai'
                  minSdkVersion 23
                  targetSdkVersion 34
                  versionCode 1
                  versionName '1.0.0'
              }
          }" > android/app/build.gradle
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
