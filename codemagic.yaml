workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Fix Build Gradle
        script: |
          # पूर्ण फाईल बदलण्याऐवजी, फक्त gradle.properties मध्ये नेमस्पेस जोडत आहोत
          echo "android.namespace=com.riderrupali.pfaai" >> android/gradle.properties
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
