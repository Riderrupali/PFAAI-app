workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          # --no-cache वापरल्याने कोणतीही जुनी फाईल वापरली जाणार नाही
          npx expo prebuild --platform android --clean --no-cache
      - name: Build APK
        script: |
          cd android
          # इथे आपण namespace आपोआप येण्यासाठी ही कमांड वापरूया
          ./gradlew assembleRelease -Pandroid.namespace=com.riderrupali.pfaai
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
