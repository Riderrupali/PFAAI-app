workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 18
      java: 17
    scripts:
      - name: Fix AI Code and Install
        script: |
          node -e "const fs=require('fs'); let d=fs.readFileSync('package.json','utf8'); fs.writeFileSync('package.json', d.replace(/\"catalog:\"/g, '\"*\"'));"
          echo "node-linker=hoisted" > .npmrc
          npm install -g pnpm@9 --force
          COREPACK_DISABLE=1 pnpm install --no-frozen-lockfile
          pnpm add expo-camera
      - name: Expo Prebuild
        script: |
          npx expo prebuild -p android --clean --no-install
          pnpm install --no-frozen-lockfile
      - name: Build APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
