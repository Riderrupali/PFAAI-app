workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Clean Install
        script: |
          npm install -g pnpm@9 --force
          pnpm install
      - name: Expo Prebuild
        script: |
          rm -rf android
          npx expo prebuild --platform android --clean
      - name: Fix Build Gradle
        script: |
          # इथे आपण namespace आणि इतर गोष्टी थेट app/build.gradle मध्ये टाकतोय
          echo "android { namespace 'com.riderrupali.pfaai' }" >> android/app/build.gradle
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
