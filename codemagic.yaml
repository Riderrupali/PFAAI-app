workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          # --force वापरल्यामुळे काहीही अडकणार नाही
          npm install --force
      - name: Expo Prebuild
        script: |
          # प्रीबिल्डच्या आधी एक्सपो इन्स्टॉल झाल्याची खात्री करा
          npx expo install --check
          npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
      
