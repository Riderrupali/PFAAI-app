name: Magic Unzip
on: push
jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - run: |
          unzip -o pfaai.zip
          cp -r pfaai/* . 2>/dev/null || true
          rm -rf pfaai pfaai.zip
          git config user.name "AI Assistant"
          git config user.email "ai@bot.com"
          git add .
          git commit -m "Unpack code"
          git push
